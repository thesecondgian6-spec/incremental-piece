<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Incremental Piece</title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body>

<div id="app">

    <!-- Background -->

    <div class="background"></div>

    <!-- Hero -->

    <header class="hero">

        <div class="hero-top">

            <div>

                <h1>Incremental Piece</h1>

                <p>East Blue</p>

            </div>

            <div class="currencies">

                <div class="currency">

                    💰

                    <span id="beli">
                        1000
                    </span>

                </div>

                <div class="currency">

                    💎

                    <span id="gems">
                        50
                    </span>

                </div>

            </div>

        </div>

        <div class="hero-bottom">

            <h2 id="islandName">

                Orange Town

            </h2>

            <p>

                Begin your pirate adventure.

            </p>

        </div>

    </header>

    <!-- Player -->

    <section
        class="player-card">

        <div class="avatar">

            🏴‍☠️

        </div>

        <div class="player-info">

            <h2 id="playerName">

                Captain Maru

            </h2>

            <p id="playerLevel">

                Lv.1 Rookie Pirate

            </p>

            <div class="tags">

                <span>Human</span>

                <span>No Fruit</span>

                <span>Rusty Sword</span>

            </div>

        </div>

        <div class="power">

            <small>

                Power

            </small>

            <h2 id="power">

                12

            </h2>

        </div>

    </section>

    <!-- Battle -->

    <section
        class="panel">

        <div class="panel-header">

            <h2>

                Current Battle

            </h2>

            <span>

                Lv.2

            </span>

        </div>

        <h3 id="enemyName">

            Bandit

        </h3>

        <div class="hp-bar">

            <div
                id="enemyHP"
                class="hp-fill">

            </div>

        </div>

        <div class="panel-row">

            <span>

                HP

            </span>

            <span
                id="enemyHealth">

                120 / 120

            </span>

        </div>

        <div class="panel-row">

            <span>

                Reward

            </span>

            <span>

                💰150

            </span>

        </div>

        <button
            id="battleBtn"
            class="primary">

            ⚔ Start Battle

        </button>

    </section>

    <!-- Daily Quest -->

    <section
        class="panel">

        <h2>

            Daily Quest

        </h2>

        <p>

            Train 10 Times

        </p>

        <div class="progress">

            <div
                class="progress-fill">

            </div>

        </div>

        <small>

            0 / 10

        </small>

    </section>

    <!-- Offline -->

    <section
        class="panel">

        <h2>

            Offline Rewards

        </h2>

        <p>

            Ready to claim

        </p>

        <button
            id="claimBtn">

            Claim Rewards

        </button>

    </section>

    <!-- Navigation -->

    <nav>

        <button class="active">

            🏠

            <span>

                Home

            </span>

        </button>

        <button>

            ⚔

            <span>

                Adventure

            </span>

        </button>

        <button>

            🎲

            <span>

                Summon

            </span>

        </button>

        <button>

            👥

            <span>

                Crew

            </span>

        </button>

        <button>

            ☰

            <span>

                Menu

            </span>

        </button>

    </nav>

</div>

<script type="module" src="main.js"></script>

</body>

</html>
